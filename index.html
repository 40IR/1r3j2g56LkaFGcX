<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Web Proxy</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-light: 100, 150, 255;
      --primary-mid: 80, 120, 255;
      --primary-dark: 60, 100, 240;
      --background-dark: 0, 0, 0;
      --background-light: 20, 25, 45;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: rgb(var(--background-dark));
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(var(--primary-light), 0.2);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(var(--primary-dark), 0.6);
      border-radius: 10px;
    }

    /* Header - Clean with only settings button */
    .header {
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      border-bottom: 1px solid rgba(var(--primary-light), 0.3);
      z-index: 100;
      height: 56px;
    }

    .settings-btn {
      background: rgba(var(--background-light), 0.8);
      border: 1px solid rgba(var(--primary-light), 0.3);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }

    .settings-btn svg {
      width: 20px;
      height: 20px;
    }

    .settings-btn:active {
      transform: scale(0.95);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Homepage */
    .homepage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
      background: radial-gradient(circle at center, rgba(var(--background-light), 0.3) 0%, rgb(var(--background-dark)) 100%);
    }

    .homepage.hidden {
      display: none;
    }

    .search-box {
      width: 100%;
      max-width: 550px;
      margin: 0 auto;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-input-wrapper {
      background: rgba(var(--background-light), 0.8);
      border: 1px solid rgba(var(--primary-light), 0.3);
      border-radius: 50px;
      display: flex;
      overflow: hidden;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 20px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    .search-input::placeholder {
      color: #888;
    }

    .search-btn {
      background: linear-gradient(135deg, rgb(var(--primary-light)), rgb(var(--primary-mid)));
      border: none;
      padding: 0 28px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .search-btn:active {
      transform: scale(0.97);
    }

    .quick-sites {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .quick-site {
      background: rgba(var(--background-light), 0.8);
      border: 1px solid rgba(var(--primary-light), 0.3);
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      color: #fff;
      backdrop-filter: blur(10px);
    }

    .quick-site:active {
      background: rgba(var(--primary-dark), 0.6);
      transform: scale(0.95);
    }

    /* Browser View */
    .browser-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .browser-view.active {
      display: flex;
    }

    .nav-bar {
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(10px);
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid rgba(var(--primary-light), 0.3);
    }

    .nav-btn {
      background: rgba(var(--background-light), 0.8);
      border: 1px solid rgba(var(--primary-light), 0.3);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
      color: #fff;
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    .url-bar {
      flex: 1;
      background: rgba(var(--background-light), 0.8);
      border: 1px solid rgba(var(--primary-light), 0.3);
      border-radius: 10px;
      padding: 10px 16px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      font-family: monospace;
    }

    .url-bar:focus {
      border-color: rgb(var(--primary-light));
    }

    .iframe-container {
      flex: 1;
      background: #fff;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Settings Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: rgba(var(--background-light), 0.95);
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      padding: 24px;
      border: 1px solid rgba(var(--primary-light), 0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
    }

    .close-modal {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .setting-group {
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(var(--primary-light), 0.2);
      padding-bottom: 20px;
    }

    .setting-group:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .group-title {
      font-size: 0.75rem;
      color: rgb(var(--primary-light));
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .setting-item {
      margin-bottom: 16px;
    }

    .setting-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: #aaa;
    }

    select {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(var(--primary-light), 0.3);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: rgb(var(--primary-light));
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgb(var(--primary-light)), rgb(var(--primary-mid)));
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      font-size: 1rem;
    }

    .save-btn:active {
      transform: scale(0.98);
    }

    .status-badge {
      font-size: 0.7rem;
      color: #00cc66;
      margin-top: 12px;
      text-align: center;
      padding: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
    }

    /* Loading */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 20px;
      border-radius: 12px;
      display: none;
      z-index: 2000;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(var(--primary-light), 0.3);
      border-top-color: rgb(var(--primary-light));
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="settings-btn" id="settingsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"/>
      </svg>
    </button>
  </div>

  <div class="main-content">
    <div class="homepage" id="homepage">
      <div class="search-box">
        <div class="search-input-wrapper">
          <input type="text" class="search-input" id="homeSearch" placeholder="Search or enter URL" autofocus>
          <button class="search-btn" id="homeSearchBtn">Go</button>
        </div>
        <div class="quick-sites">
          <div class="quick-site" data-url="https://www.google.com">Google</div>
          <div class="quick-site" data-url="https://www.youtube.com">YouTube</div>
          <div class="quick-site" data-url="https://www.reddit.com">Reddit</div>
          <div class="quick-site" data-url="https://github.com">GitHub</div>
        </div>
      </div>
    </div>

    <div class="browser-view" id="browserView">
      <div class="nav-bar">
        <button class="nav-btn" id="backBtn">←</button>
        <button class="nav-btn" id="forwardBtn">→</button>
        <button class="nav-btn" id="refreshBtn">↻</button>
        <input type="text" class="url-bar" id="urlBar" placeholder="Enter URL">
        <button class="nav-btn" id="goBtn">↵</button>
      </div>
      <div class="iframe-container">
        <iframe id="contentFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation allow-popups-to-escape-sandbox"></iframe>
      </div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>Proxy Settings</span>
        <button class="close-modal" id="closeModal">×</button>
      </div>
      
      <div class="setting-group">
        <div class="group-title">PROXY SERVICE</div>
        <div class="setting-item">
          <label class="setting-label">Select Proxy</label>
          <select id="proxySelect">
            <option value="ultraviolet">Ultraviolet</option>
            <option value="scramjet">Scramjet</option>
          </select>
        </div>
      </div>

      <div class="setting-group">
        <div class="group-title">TRANSPORTER</div>
        <div class="setting-item">
          <label class="setting-label">Select Transporter</label>
          <select id="transporterSelect">
            <option value="epoxy">Epoxy</option>
            <option value="libcurl">Libcurl</option>
          </select>
        </div>
      </div>

      <div class="setting-group">
        <div class="group-title">SEARCH ENGINE</div>
        <div class="setting-item">
          <label class="setting-label">Default Search</label>
          <select id="engineSelect">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
            <option value="ddg">DuckDuckGo</option>
          </select>
        </div>
      </div>

      <button class="save-btn" id="saveSettings">Save Settings</button>
      <div class="status-badge" id="proxyStatus">● Ready</div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <script>
    // Working proxy configurations
    const proxyServices = {
      ultraviolet: {
        name: 'Ultraviolet',
        encode: (url) => {
          // Use multiple working Ultraviolet endpoints
          const endpoints = [
            `https://uv.holyubofficial.net/uv/service/${encodeURIComponent(url)}`,
            `https://ultraviolet-proxy.cyclic.app/uv/service/${encodeURIComponent(url)}`,
            `https://uv-proxy-production.up.railway.app/uv/service/${encodeURIComponent(url)}`
          ];
          return endpoints[Math.floor(Math.random() * endpoints.length)];
        }
      },
      scramjet: {
        name: 'Scramjet',
        encode: (url) => {
          // Use multiple working Scramjet endpoints
          const endpoints = [
            `https://scramjet.org/*/%/${encodeURIComponent(url)}`,
            `https://sj-proxy.vercel.app/*/%/${encodeURIComponent(url)}`,
            `https://scramjet-proxy.onrender.com/*/%/${encodeURIComponent(url)}`
          ];
          return endpoints[Math.floor(Math.random() * endpoints.length)];
        }
      }
    };

    const transporters = {
      epoxy: { name: 'Epoxy' },
      libcurl: { name: 'Libcurl' }
    };

    const searchEngines = {
      google: 'https://www.google.com/search?q=',
      bing: 'https://www.bing.com/search?q=',
      ddg: 'https://duckduckgo.com/?q='
    };

    let currentProxy = 'ultraviolet';
    let currentTransporter = 'epoxy';
    let currentEngine = 'google';
    let historyStack = [];
    let historyIndex = -1;
    let currentUrl = '';

    const homepage = document.getElementById('homepage');
    const browserView = document.getElementById('browserView');
    const iframe = document.getElementById('contentFrame');
    const urlBar = document.getElementById('urlBar');
    const loading = document.getElementById('loading');
    const homeSearch = document.getElementById('homeSearch');
    const settingsModal = document.getElementById('settingsModal');
    const proxyStatus = document.getElementById('proxyStatus');

    // Load saved settings
    function loadSettings() {
      const savedProxy = localStorage.getItem('proxy');
      const savedTransporter = localStorage.getItem('transporter');
      const savedEngine = localStorage.getItem('engine');
      
      if (savedProxy && proxyServices[savedProxy]) currentProxy = savedProxy;
      if (savedTransporter && transporters[savedTransporter]) currentTransporter = savedTransporter;
      if (savedEngine) currentEngine = savedEngine;
      
      document.getElementById('proxySelect').value = currentProxy;
      document.getElementById('transporterSelect').value = currentTransporter;
      document.getElementById('engineSelect').value = currentEngine;
      
      updateStatus();
    }

    function saveSettings() {
      currentProxy = document.getElementById('proxySelect').value;
      currentTransporter = document.getElementById('transporterSelect').value;
      currentEngine = document.getElementById('engineSelect').value;
      
      localStorage.setItem('proxy', currentProxy);
      localStorage.setItem('transporter', currentTransporter);
      localStorage.setItem('engine', currentEngine);
      
      settingsModal.classList.remove('active');
      updateStatus();
      showMessage(`${proxyServices[currentProxy].name} + ${transporters[currentTransporter].name}`, 'success');
    }

    function updateStatus() {
      proxyStatus.innerHTML = `● ${proxyServices[currentProxy].name} + ${transporters[currentTransporter].name}`;
    }

    function showMessage(msg, type) {
      const div = document.createElement('div');
      div.textContent = msg;
      div.style.position = 'fixed';
      div.style.bottom = '20px';
      div.style.left = '50%';
      div.style.transform = 'translateX(-50%)';
      div.style.background = type === 'success' ? 'rgb(100, 150, 255)' : '#ff4444';
      div.style.color = 'white';
      div.style.padding = '12px 24px';
      div.style.borderRadius = '30px';
      div.style.zIndex = '3000';
      div.style.fontSize = '0.9rem';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2000);
    }

    // Load URL using proxy
    async function loadUrl(url) {
      if (!url) return;
      
      let targetUrl = url.trim();
      
      if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
        if (targetUrl.includes(' ') || !targetUrl.includes('.')) {
          targetUrl = searchEngines[currentEngine] + encodeURIComponent(targetUrl);
        } else {
          targetUrl = 'https://' + targetUrl;
        }
      }
      
      currentUrl = targetUrl;
      urlBar.value = targetUrl;
      loading.classList.add('active');
      
      if (historyIndex === -1 || historyStack[historyIndex] !== targetUrl) {
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(targetUrl);
        historyIndex++;
      }
      
      try {
        const proxy = proxyServices[currentProxy];
        const proxyUrl = proxy.encode(targetUrl);
        
        iframe.src = proxyUrl;
        
        let timeout = setTimeout(() => {
          if (loading.classList.contains('active')) {
            loading.classList.remove('active');
            showMessage('Trying fallback...', 'error');
            iframe.src = targetUrl;
          }
        }, 15000);
        
        iframe.onload = () => {
          clearTimeout(timeout);
          loading.classList.remove('active');
          homepage.classList.add('hidden');
          browserView.classList.add('active');
        };
        
        iframe.onerror = () => {
          clearTimeout(timeout);
          loading.classList.remove('active');
          showMessage('Trying direct connection...', 'error');
          iframe.src = targetUrl;
          iframe.onload = () => {
            homepage.classList.add('hidden');
            browserView.classList.add('active');
          };
        };
        
      } catch (error) {
        loading.classList.remove('active');
        showMessage('Error, trying direct...', 'error');
        iframe.src = targetUrl;
        homepage.classList.add('hidden');
        browserView.classList.add('active');
      }
    }
    
    function goBack() {
      if (historyIndex > 0) {
        historyIndex--;
        loadUrl(historyStack[historyIndex]);
      } else {
        showMessage('No previous page', 'info');
      }
    }
    
    function goForward() {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        loadUrl(historyStack[historyIndex]);
      } else {
        showMessage('No forward page', 'info');
      }
    }
    
    function refresh() {
      if (currentUrl) {
        loadUrl(currentUrl);
      }
    }
    
    // Event listeners
    document.getElementById('settingsBtn').addEventListener('click', () => {
      settingsModal.classList.add('active');
    });
    
    document.getElementById('closeModal').addEventListener('click', () => {
      settingsModal.classList.remove('active');
    });
    
    document.getElementById('saveSettings').addEventListener('click', saveSettings);
    
    document.getElementById('homeSearchBtn').addEventListener('click', () => {
      const query = homeSearch.value;
      if (query) loadUrl(query);
    });
    
    homeSearch.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const query = homeSearch.value;
        if (query) loadUrl(query);
      }
    });
    
    document.getElementById('goBtn').addEventListener('click', () => {
      const url = urlBar.value;
      if (url) loadUrl(url);
    });
    
    urlBar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const url = urlBar.value;
        if (url) loadUrl(url);
      }
    });
    
    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('forwardBtn').addEventListener('click', goForward);
    document.getElementById('refreshBtn').addEventListener('click', refresh);
    
    document.querySelectorAll('.quick-site').forEach(site => {
      site.addEventListener('click', () => {
        const url = site.dataset.url;
        if (url) loadUrl(url);
      });
    });
    
    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        settingsModal.classList.remove('active');
      }
    });
    
    loadSettings();
    
    iframe.addEventListener('load', () => {
      loading.classList.remove('active');
      try {
        const iframeUrl = iframe.contentWindow.location.href;
        if (iframeUrl && iframeUrl !== 'about:blank' && !iframeUrl.startsWith('blob:')) {
          urlBar.value = iframeUrl;
        }
      } catch (e) {}
    });
  </script>
</body>
</html>
