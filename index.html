<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #ddd;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .main { width: 100%; max-width: 680px; padding: 0 16px; }
    form { display: flex; width: 100%; }
    input {
      flex: 1;
      padding: 1rem 1.3rem;
      font-size: 1.25rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 999px 0 0 999px;
      color: #eee;
      outline: none;
    }
    input::placeholder { color: #888; }
    input:focus { border-color: #0066ff; box-shadow: 0 0 0 3px rgba(0,102,255,0.15); }
    button {
      padding: 0 1.8rem;
      font-size: 1.25rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 0 999px 999px 0;
      cursor: pointer;
    }
    button:active { background: #0055dd; }
    #msg {
      margin-top: 1.2rem;
      color: #777;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.4s;
      text-align: center;
    }
    #msg.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="main">
    <form id="form">
      <input id="input" type="text" placeholder="Search notes or web" autocomplete="off" autofocus>
      <button type="submit">→</button>
    </form>
    <div id="msg"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const msg = document.getElementById('msg');

    let currentFrame = null;

    // Expanded 2026 CORS proxies (more resilient/less blocked ones)
    const corsProxies = [
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?',
      'https://thingproxy.freeboard.io/fetch/',
      'https://proxy.cors.sh/',
      'https://cors-anywhere.herokuapp.com/'  // still up in some forks
    ];

    function showMsg(text, dur = 4000) {
      msg.textContent = text;
      msg.classList.add('show');
      if (dur) setTimeout(() => msg.classList.remove('show'), dur);
    }

    function cleanup() {
      if (currentFrame) {
        currentFrame.remove();
        currentFrame = null;
      }
      document.body.style.overflow = '';
    }

    async function fetchWithCors(target) {
      for (const p of corsProxies) {
        try {
          const res = await fetch(p + encodeURIComponent(target), { mode: 'cors' });
          if (res.ok) return await res.text();
        } catch {}
      }
      return null;
    }

    function openNewTab(url) {
      const w = window.open(url, '_blank');
      if (w) showMsg('Opened in new tab (best compatibility)');
      else showMsg('Popup blocked — allow popups or long-press to open');
    }

    async function trySrcdoc(targetUrl) {
      cleanup();
      showMsg('Trying content fetch...');

      const html = await fetchWithCors(targetUrl);
      if (!html) {
        openNewTab(targetUrl);
        return;
      }

      // Basic relative link fix
      const base = new URL(targetUrl).origin;
      const rewritten = html
        .replace(/href=["']\/([^"']*)["']/g, `href="${base}/$1"`)
        .replace(/src=["']\/([^"']*)["']/g, `src="${base}/$1"`);

      const frame = document.createElement('iframe');
      frame.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;background:#fff;';
      frame.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation';
      frame.srcdoc = rewritten;

      frame.onload = () => {
        currentFrame = frame;
        document.body.appendChild(frame);
        document.body.style.overflow = 'hidden';
        showMsg('Content loaded (limited interactivity)', 3000);
      };

      frame.onerror = () => {
        frame.remove();
        openNewTab(targetUrl);
      };

      document.body.appendChild(frame);
    }

    function tryIframe(url) {
      cleanup();

      const frame = document.createElement('iframe');
      frame.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;background:#fff;';
      frame.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation-by-user-activation';
      frame.src = url;

      let timeout = setTimeout(() => {
        if (!frame.contentDocument?.body?.innerHTML?.trim() || frame.contentDocument?.title === '') {
          frame.remove();
          trySrcdoc(url);
        }
      }, 2000);

      frame.onload = () => {
        clearTimeout(timeout);
        try {
          const doc = frame.contentDocument || frame.contentWindow?.document;
          if (doc) {
            // Image proxy via DDG to reduce tracking/CORS noise
            doc.querySelectorAll('img').forEach(img => {
              if (img.src && !img.src.includes('duckduckgo.com')) {
                img.src = 'https://external-content.duckduckgo.com/iu/?u=' + encodeURIComponent(img.src);
              }
            });
          }
        } catch {}
        currentFrame = frame;
        document.body.appendChild(frame);
        document.body.style.overflow = 'hidden';
      };

      frame.onerror = () => {
        clearTimeout(timeout);
        frame.remove();
        trySrcdoc(url);
      };

      document.body.appendChild(frame);
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      let val = input.value.trim();
      if (!val) return;

      let url;
      const isSearch = val.includes(' ') && !val.match(/\.[a-z]{2,}$/i) && !val.includes('://');

      if (isSearch) {
        url = 'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(val);
      } else {
        url = /^https?:\/\//i.test(val) ? val : 'https://' + val;
      }

      // Direct iframe for quizlet.one (works well)
      if (url.includes('quizlet.one')) {
        tryIframe(url);
      } else {
        // General flow: iframe → srcdoc → new tab
        tryIframe(url);
      }

      input.blur();
    });

    // Exit iframe on Esc or click outside
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && currentFrame) {
        cleanup();
        input.focus();
      }
    });

    document.addEventListener('click', e => {
      if (currentFrame && !e.target.closest('iframe')) {
        cleanup();
        input.focus();
      }
    });
  </script>
</body>
</html>
