<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }
    #ui {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.3s;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }
    form {
      width: 90%;
      max-width: 720px;
      display: flex;
    }
    input {
      flex: 1;
      padding: 1.2rem 1.5rem;
      font-size: 1.35rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 999px 0 0 999px;
      color: #fff;
      outline: none;
    }
    input::placeholder { color: #777; }
    input:focus { border-color: #0066ff; box-shadow: 0 0 0 4px rgba(0,102,255,0.2); }
    button {
      padding: 0 2.4rem;
      font-size: 1.35rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 0 999px 999px 0;
      cursor: pointer;
    }
    button:active { background: #0055dd; }
    #status {
      margin-top: 1.4rem;
      color: #888;
      font-size: 1rem;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

  <div id="ui">
    <form id="frm">
      <input id="inp" type="text" placeholder="Search or enter URL" autocomplete="off" autofocus>
      <button type="submit">→</button>
    </form>
    <div id="status"></div>
  </div>

  <iframe id="frme" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation allow-storage-access-by-user-activation"></iframe>

  <script>
    const ui = document.getElementById('ui');
    const frme = document.getElementById('frme');
    const frm = document.getElementById('frm');
    const inp = document.getElementById('inp');
    const status = document.getElementById('status');

    function setStatus(txt = '', err = false) {
      status.textContent = txt;
      status.style.color = err ? '#ff6666' : '#888';
    }

    function go(url) {
      setStatus('Loading...');
      frme.src = url;
      frme.style.display = 'block';
      ui.classList.add('hidden');
      inp.blur();
    }

    function back() {
      frme.style.display = 'none';
      frme.src = 'about:blank';
      ui.classList.remove('hidden');
      setStatus('');
      inp.focus();
      inp.select();
    }

    frm.addEventListener('submit', e => {
      e.preventDefault();
      let v = inp.value.trim();
      if (!v) return;

      let url;
      if (v.includes(' ') || !v.includes('.')) {
        url = 'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(v);
      } else {
        url = v.startsWith('http') ? v : 'https://' + v;
      }

      go(url);
    });

    // Escape → back to input
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') back();
    });

    // Click outside frame → back (mobile/touch friendly)
    document.addEventListener('click', e => {
      if (frme.style.display === 'block' && !frme.contains(e.target)) {
        back();
      }
    });

    // Try to detect CSP / XFO block quickly
    frme.addEventListener('load', () => {
      try {
        const d = frme.contentDocument || frme.contentWindow?.document;
        if (d && !d.body?.innerHTML?.trim()) {
          setStatus('Site blocks embedding (security rules)', true);
          setTimeout(back, 2200);
        } else {
          setStatus('');
          // Image proxy attempt (DDG) to help some content
          try {
            d.querySelectorAll('img').forEach(img => {
              if (img.src && !img.src.includes('duckduckgo')) {
                img.src = 'https://external-content.duckduckgo.com/iu/?u=' + encodeURIComponent(img.src);
              }
            });
          } catch {}
        }
      } catch (err) {
        // Most likely CSP block
        setStatus('Blocked by site (frame-ancestors or similar)', true);
        setTimeout(back, 2800);
      }
    });
  </script>
</body>
</html>
