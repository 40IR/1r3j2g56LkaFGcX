<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }
    #ui {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,0.96);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }
    #top-bar {
      position: absolute;
      top: 12px;
      right: 16px;
      z-index: 15;
    }
    #cog {
      font-size: 1.8rem;
      cursor: pointer;
      color: #888;
      transition: color 0.2s;
    }
    #cog:hover { color: #aaa; }
    form {
      width: 90%;
      max-width: 720px;
      display: flex;
      margin-bottom: 1.2rem;
    }
    input {
      flex: 1;
      padding: 1.2rem 1.5rem;
      font-size: 1.35rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 999px 0 0 999px;
      color: #fff;
      outline: none;
    }
    input::placeholder { color: #777; }
    input:focus { border-color: #0066ff; box-shadow: 0 0 0 4px rgba(0,102,255,0.2); }
    button {
      padding: 0 2.4rem;
      font-size: 1.35rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 0 999px 999px 0;
      cursor: pointer;
    }
    button:active { background: #0055dd; }
    #settings-panel {
      background: #111;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
      width: 90%;
      max-width: 320px;
      text-align: left;
      display: none;
    }
    #settings-panel label {
      display: block;
      margin-bottom: 0.5rem;
      color: #ccc;
      font-size: 1rem;
    }
    #settings-panel select {
      width: 100%;
      padding: 0.6rem;
      background: #222;
      color: #eee;
      border: 1px solid #555;
      border-radius: 8px;
      font-size: 1rem;
    }
    #status {
      margin-top: 1.2rem;
      color: #888;
      font-size: 1rem;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

  <div id="top-bar">
    <span id="cog">⚙️</span>
  </div>

  <div id="ui">
    <form id="frm">
      <input id="inp" type="text" placeholder="Search or enter URL" autocomplete="off" autofocus>
      <button type="submit">→</button>
    </form>

    <div id="settings-panel">
      <label>Search engine</label>
      <select id="engine">
        <option value="ddg-lite">DuckDuckGo Lite</option>
        <option value="google">Google</option>
        <option value="bing">Bing</option>
        <option value="startpage">Startpage</option>
      </select>
    </div>

    <div id="status"></div>
  </div>

  <iframe id="frme" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation allow-storage-access-by-user-activation"></iframe>

  <script>
    const ui = document.getElementById('ui');
    const frme = document.getElementById('frme');
    const frm = document.getElementById('frm');
    const inp = document.getElementById('inp');
    const status = document.getElementById('status');
    const cog = document.getElementById('cog');
    const settingsPanel = document.getElementById('settings-panel');
    const engineSelect = document.getElementById('engine');

    const engines = {
      'ddg-lite': 'https://html.duckduckgo.com/html/?q=',
      'google': 'https://www.google.com/search?q=',
      'bing': 'https://www.bing.com/search?q=',
      'startpage': 'https://www.startpage.com/sp/search?query='
    };

    let currentEngine = 'ddg-lite';

    engineSelect.addEventListener('change', () => {
      currentEngine = engineSelect.value;
    });

    cog.addEventListener('click', () => {
      settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
    });

    function setStatus(txt = '', err = false) {
      status.textContent = txt;
      status.style.color = err ? '#ff6666' : '#888';
    }

    function go(url) {
      setStatus('Loading...');
      frme.src = url;
      frme.style.display = 'block';
      ui.classList.add('hidden');
      settingsPanel.style.display = 'none';
      inp.blur();
    }

    function back() {
      frme.style.display = 'none';
      frme.src = 'about:blank';
      ui.classList.remove('hidden');
      setStatus('');
      inp.focus();
      inp.select();
    }

    frm.addEventListener('submit', e => {
      e.preventDefault();
      let v = inp.value.trim();
      if (!v) return;

      let url;
      if (!v.includes(' ') && v.includes('.')) {
        url = v.startsWith('http') ? v : 'https://' + v;
      } else {
        const base = engines[currentEngine];
        url = base + encodeURIComponent(v);
      }

      go(url);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') back();
    });

    document.addEventListener('click', e => {
      if (frme.style.display === 'block' && !frme.contains(e.target) && !ui.contains(e.target)) {
        back();
      }
    });

    frme.addEventListener('load', () => {
      try {
        const d = frme.contentDocument || frme.contentWindow?.document;
        if (d && !d.body?.innerHTML?.trim()) {
          setStatus('Site blocked embedding', true);
          setTimeout(back, 2200);
        } else {
          setStatus('');
        }
      } catch {
        setStatus('Blocked by site rules', true);
        setTimeout(back, 2800);
      }
    });
  </script>
</body>
</html>
