<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .main { width: 100%; max-width: 680px; padding: 0 20px; text-align: center; }
    form { display: flex; width: 100%; }
    input {
      flex: 1;
      padding: 1.1rem 1.4rem;
      font-size: 1.3rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 999px 0 0 999px;
      color: #fff;
      outline: none;
    }
    input::placeholder { color: #888; }
    input:focus { border-color: #0066ff; box-shadow: 0 0 0 3px rgba(0,102,255,0.2); }
    button {
      padding: 0 2rem;
      font-size: 1.3rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 0 999px 999px 0;
      cursor: pointer;
    }
    button:active { background: #0055dd; }
    #msg {
      margin-top: 1.5rem;
      color: #888;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #msg.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="main">
    <form id="form">
      <input id="input" type="text" placeholder="Search notes or web" autocomplete="off" autofocus>
      <button type="submit">→</button>
    </form>
    <div id="msg"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const msg = document.getElementById('msg');

    function showMsg(text, dur = 5000) {
      msg.textContent = text;
      msg.classList.add('show');
      if (dur) setTimeout(() => msg.classList.remove('show'), dur);
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      let val = input.value.trim();
      if (!val) return;

      let url;
      const isSearch = val.includes(' ') && !val.match(/\.[a-z]{2,}$/i) && !val.includes('://');

      if (isSearch) {
        // Lite DDG for better chance on restricted networks
        url = 'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(val);
      } else {
        url = /^https?:\/\//i.test(val) ? val : 'https://' + val;
      }

      // Prefer new tab on iOS (more reliable than location.href in some filters)
      const win = window.open(url, '_blank');
      if (win) {
        showMsg('Opened in new tab');
      } else {
        // Fallback: same-tab redirect if popup blocked
        showMsg('Popup blocked — redirecting...', 2000);
        setTimeout(() => { location.href = url; }, 1500);
      }

      input.blur();
    });

    // Optional: clear msg on input
    input.addEventListener('input', () => msg.classList.remove('show'));
  </script>
</body>
</html>
