<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #eee;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #input-area {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 700px;
      z-index: 10;
      text-align: center;
    }
    form {
      display: flex;
      width: 100%;
    }
    input {
      flex: 1;
      padding: 1.2rem 1.5rem;
      font-size: 1.35rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 999px 0 0 999px;
      color: #fff;
      outline: none;
    }
    input::placeholder { color: #888; }
    input:focus { border-color: #0066ff; box-shadow: 0 0 0 3px rgba(0,102,255,0.2); }
    button {
      padding: 0 2.2rem;
      font-size: 1.35rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 0 999px 999px 0;
      cursor: pointer;
    }
    button:active { background: #0055dd; }
    #msg {
      margin-top: 1.5rem;
      color: #888;
      font-size: 1rem;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #fff;
      z-index: 5;
    }
  </style>
</head>
<body>

  <div id="container">
    <div id="input-area">
      <form id="form">
        <input id="input" type="text" placeholder="Search notes or web" autocomplete="off" autofocus>
        <button type="submit">→</button>
      </form>
      <div id="msg"></div>
    </div>

    <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation-by-user-activation"></iframe>
  </div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const frame = document.getElementById('frame');
    const msg = document.getElementById('msg');
    const inputArea = document.getElementById('input-area');

    function showMsg(text) {
      msg.textContent = text;
    }

    function loadInFrame(url) {
      showMsg('Loading...');
      frame.src = url;
      frame.onload = () => {
        showMsg('');
        frame.style.display = 'block';
        inputArea.style.display = 'none'; // hide input after load
      };
      frame.onerror = () => {
        showMsg('Failed to load — site may block embedding. Try a different URL.');
        frame.style.display = 'none';
        inputArea.style.display = 'block';
      };
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      let val = input.value.trim();
      if (!val) return;

      let url;
      // If looks like domain (no spaces, has TLD-ish ending)
      if (!val.includes(' ') && val.match(/\.[a-z]{2,}$/i)) {
        url = val.startsWith('http') ? val : 'https://' + val;
      } else {
        // Search or anything else → lite DDG
        url = 'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(val);
      }

      loadInFrame(url);
      input.blur();
    });

    // Exit iframe / show input again
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        frame.style.display = 'none';
        frame.src = 'about:blank';
        inputArea.style.display = 'block';
        input.focus();
        showMsg('');
      }
    });

    // Click outside frame to exit (mobile friendly)
    document.addEventListener('click', e => {
      if (frame.style.display === 'block' && !frame.contains(e.target) && !inputArea.contains(e.target)) {
        frame.style.display = 'none';
        frame.src = 'about:blank';
        inputArea.style.display = 'block';
        input.focus();
        showMsg('');
      }
    });

    // Optional: re-show input if frame unloads
    frame.addEventListener('unload', () => {
      inputArea.style.display = 'block';
    });
  </script>
</body>
</html>
