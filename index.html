<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 16px;
      overflow-y: auto;
    }
    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #0066ff;
    }
    form {
      display: flex;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    input {
      flex: 1;
      padding: 1.1rem 1.4rem;
      font-size: 1.2rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 999px 0 0 999px;
      color: #fff;
      outline: none;
    }
    input::placeholder { color: #777; }
    input:focus {
      border-color: #0066ff;
      box-shadow: 0 0 0 3px rgba(0,102,255,0.2);
    }
    button {
      padding: 0 2rem;
      font-size: 1.2rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 0 999px 999px 0;
      cursor: pointer;
    }
    button:active { background: #0055dd; }
    #settings {
      margin: 1.5rem 0 2rem;
      font-size: 1.05rem;
      color: #ccc;
    }
    #engine {
      padding: 0.8rem 1.2rem;
      font-size: 1.05rem;
      background: #111;
      color: #eee;
      border: 1px solid #444;
      border-radius: 8px;
    }
    #status {
      margin-top: 1.5rem;
      color: #888;
      font-size: 1.05rem;
    }

    /* Mobile keyboard fix + extra spacing */
    @media (max-width: 600px) {
      h1 { font-size: 2.4rem; margin-bottom: 1.8rem; }
      input, button { font-size: 1.15rem; padding: 1rem 1.2rem; }
      form { margin-bottom: 1.2rem; }
      #settings { margin: 1.2rem 0 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Notes</h1>

    <form id="frm">
      <input id="inp" type="text" placeholder="Search or enter URL" autocomplete="off" autofocus>
      <button type="submit">→</button>
    </form>

    <div id="settings">
      <label>Search engine: </label>
      <select id="engine">
        <option value="bing" selected>Bing</option>
        <option value="ddg-lite">DuckDuckGo Lite</option>
        <option value="startpage">Startpage</option>
        <option value="google">Google</option>
      </select>
    </div>

    <div id="status"></div>
  </div>

  <script>
    const frm = document.getElementById('frm');
    const inp = document.getElementById('inp');
    const status = document.getElementById('status');
    const engineSelect = document.getElementById('engine');

    const engines = {
      'ddg-lite': 'https://html.duckduckgo.com/html/?q=',
      'bing': 'https://www.bing.com/search?q=',
      'startpage': 'https://www.startpage.com/sp/search?query=',
      'google': 'https://www.google.com/search?q='
    };

    let currentEngine = 'bing';

    engineSelect.addEventListener('change', () => currentEngine = engineSelect.value);

    frm.addEventListener('submit', e => {
      e.preventDefault();
      let v = inp.value.trim();
      if (!v) return;

      let url;
      if (!v.includes(' ') && v.includes('.')) {
        url = v.startsWith('http') ? v : 'https://' + v;
      } else {
        url = engines[currentEngine] + encodeURIComponent(v);
      }

      status.textContent = 'Opening...';
      const win = window.open(url, '_blank');
      if (win) {
        status.textContent = 'Opened in new tab';
      } else {
        status.textContent = 'Popup blocked — redirecting...';
        setTimeout(() => { location.href = url; }, 1000);
      }
      inp.blur();
    });

    // Clear status on new input
    inp.addEventListener('input', () => status.textContent = '');
  </script>
</body>
</html>
