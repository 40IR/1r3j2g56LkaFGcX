<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }
    #ui {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,0.96);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s;
    }
    #ui.hidden { opacity: 0; pointer-events: none; }
    form {
      width: 90%;
      max-width: 720px;
      display: flex;
      margin-bottom: 1rem;
    }
    input {
      flex: 1;
      padding: 1.2rem 1.5rem;
      font-size: 1.35rem;
      background: #111;
      border: 1px solid #444;
      border-radius: 999px 0 0 999px;
      color: #fff;
      outline: none;
    }
    input::placeholder { color: #777; }
    input:focus { border-color: #0066ff; box-shadow: 0 0 0 4px rgba(0,102,255,0.2); }
    button {
      padding: 0 2.4rem;
      font-size: 1.35rem;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 0 999px 999px 0;
      cursor: pointer;
    }
    button:active { background: #0055dd; }
    #settings {
      margin: 1rem 0;
      font-size: 1rem;
      color: #aaa;
    }
    #settings select {
      background: #111;
      color: #eee;
      border: 1px solid #444;
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
    }
    #status {
      margin-top: 1rem;
      color: #888;
      font-size: 1rem;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

  <div id="ui">
    <form id="frm">
      <input id="inp" type="text" placeholder="Search or enter URL" autocomplete="off" autofocus>
      <button type="submit">→</button>
    </form>

    <div id="settings">
      Search engine: 
      <select id="engine">
        <option value="ddg-lite">DuckDuckGo Lite</option>
        <option value="google">Google</option>
        <option value="bing">Bing</option>
        <option value="startpage">Startpage (privacy)</option>
      </select>
    </div>

    <div id="status"></div>
  </div>

  <iframe id="frme" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation allow-storage-access-by-user-activation"></iframe>

  <script>
    const ui = document.getElementById('ui');
    const frme = document.getElementById('frme');
    const frm = document.getElementById('frm');
    const inp = document.getElementById('inp');
    const status = document.getElementById('status');
    const engineSelect = document.getElementById('engine');

    const engines = {
      'ddg-lite': 'https://html.duckduckgo.com/html/?q=',
      'google': 'https://www.google.com/search?q=',
      'bing': 'https://www.bing.com/search?q=',
      'startpage': 'https://www.startpage.com/sp/search?query='
    };

    let currentEngine = 'ddg-lite'; // default

    engineSelect.addEventListener('change', () => {
      currentEngine = engineSelect.value;
    });

    function setStatus(txt = '', err = false) {
      status.textContent = txt;
      status.style.color = err ? '#ff6666' : '#888';
    }

    function go(url) {
      setStatus('Loading...');
      frme.src = url;
      frme.style.display = 'block';
      ui.classList.add('hidden');
      inp.blur();
    }

    function back() {
      frme.style.display = 'none';
      frme.src = 'about:blank';
      ui.classList.remove('hidden');
      setStatus('');
      inp.focus();
      inp.select();
    }

    frm.addEventListener('submit', e => {
      e.preventDefault();
      let v = inp.value.trim();
      if (!v) return;

      let url;

      // If looks like direct URL (has dot, no spaces)
      if (!v.includes(' ') && v.includes('.')) {
        url = v.startsWith('http') ? v : 'https://' + v;
      } else {
        // Search using selected engine
        const base = engines[currentEngine];
        url = base + encodeURIComponent(v);
      }

      go(url);
    });

    // Esc → back
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') back();
    });

    // Click outside → back
    document.addEventListener('click', e => {
      if (frme.style.display === 'block' && !frme.contains(e.target)) {
        back();
      }
    });

    // Load detection for blocks
    frme.addEventListener('load', () => {
      try {
        const d = frme.contentDocument || frme.contentWindow?.document;
        if (d && !d.body?.innerHTML?.trim()) {
          setStatus('Site blocks loading in frame (security rules)', true);
          setTimeout(back, 2500);
        } else {
          setStatus('');
          // Attempt DDG image proxy
          try {
            d.querySelectorAll('img').forEach(img => {
              if (img.src && !img.src.includes('duckduckgo.com')) {
                img.src = 'https://external-content.duckduckgo.com/iu/?u=' + encodeURIComponent(img.src);
              }
            });
          } catch {}
        }
      } catch (err) {
        setStatus('Blocked by site security (frame-ancestors / CSP)', true);
        setTimeout(back, 3000);
      }
    });
  </script>
</body>
