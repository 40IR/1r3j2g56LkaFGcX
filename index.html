<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>⇄</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: rgba(20, 20, 20, 0.98);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
      z-index: 100;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #0066ff;
    }

    .settings-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      width: 40px;
      height: 40px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .settings-btn:active {
      transform: scale(0.95);
      background: #2a2a2a;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    /* Homepage */
    .homepage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 20px;
    }

    .homepage.hidden {
      display: none;
    }

    .big-icon {
      font-size: 4rem;
      margin-bottom: 2rem;
    }

    .search-box {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .search-input-wrapper {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 50px;
      display: flex;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 20px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    .search-input::placeholder {
      color: #666;
    }

    .search-btn {
      background: #0066ff;
      border: none;
      padding: 0 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }

    .search-btn:active {
      background: #0052cc;
    }

    .quick-sites {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .quick-site {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .quick-site:active {
      background: #0066ff;
      transform: scale(0.95);
    }

    /* Browser View */
    .browser-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .browser-view.active {
      display: flex;
    }

    .nav-bar {
      background: #1a1a1a;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .nav-btn {
      background: #0a0a0a;
      border: 1px solid #333;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .nav-btn:active {
      background: #2a2a2a;
      transform: scale(0.95);
    }

    .url-bar {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 30px;
      padding: 8px 16px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      font-family: monospace;
    }

    .iframe-container {
      flex: 1;
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Settings Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1a1a1a;
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      padding: 24px;
      border: 1px solid #333;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .close-modal {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .setting-item {
      margin-bottom: 20px;
    }

    .setting-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #aaa;
    }

    select, input {
      width: 100%;
      padding: 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      background: #0066ff;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .save-btn:active {
      background: #0052cc;
      transform: scale(0.98);
    }

    /* Loading */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 20px;
      border-radius: 12px;
      display: none;
      z-index: 2000;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #0066ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">⇄</div>
    <div class="settings-btn" id="settingsBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"/>
      </svg>
    </div>
  </div>

  <div class="main-content">
    <!-- Homepage -->
    <div class="homepage" id="homepage">
      <div class="big-icon">🌐</div>
      <div class="search-box">
        <div class="search-input-wrapper">
          <input type="text" class="search-input" id="homeSearch" placeholder="Search or enter URL">
          <button class="search-btn" id="homeSearchBtn">Go</button>
        </div>
        <div class="quick-sites">
          <div class="quick-site" data-url="https://www.google.com">Google</div>
          <div class="quick-site" data-url="https://www.youtube.com">YouTube</div>
          <div class="quick-site" data-url="https://www.reddit.com">Reddit</div>
          <div class="quick-site" data-url="https://www.twitter.com">Twitter</div>
        </div>
      </div>
    </div>

    <!-- Browser View -->
    <div class="browser-view" id="browserView">
      <div class="nav-bar">
        <button class="nav-btn" id="backBtn">←</button>
        <button class="nav-btn" id="forwardBtn">→</button>
        <button class="nav-btn" id="refreshBtn">↻</button>
        <input type="text" class="url-bar" id="urlBar" placeholder="Enter URL">
        <button class="nav-btn" id="goBtn">↵</button>
      </div>
      <div class="iframe-container">
        <iframe id="contentFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation"></iframe>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>Settings</span>
        <button class="close-modal" id="closeModal">×</button>
      </div>
      <div class="setting-item">
        <label class="setting-label">Proxy Server</label>
        <select id="proxySelect">
          <option value="direct">Direct (No Proxy)</option>
          <option value="cors">CORS Anywhere</option>
          <option value="allorigins">AllOrigins</option>
          <option value="corsproxy">CORS Proxy</option>
        </select>
      </div>
      <div class="setting-item">
        <label class="setting-label">Search Engine</label>
        <select id="engineSelect">
          <option value="google">Google</option>
          <option value="bing">Bing</option>
          <option value="ddg">DuckDuckGo</option>
        </select>
      </div>
      <button class="save-btn" id="saveSettings">Save Settings</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <script>
    // Settings
    let currentProxy = 'direct';
    let currentEngine = 'google';
    let historyStack = [];
    let historyIndex = -1;
    let currentUrl = '';

    const homepage = document.getElementById('homepage');
    const browserView = document.getElementById('browserView');
    const iframe = document.getElementById('contentFrame');
    const urlBar = document.getElementById('urlBar');
    const loading = document.getElementById('loading');
    const homeSearch = document.getElementById('homeSearch');
    const settingsModal = document.getElementById('settingsModal');

    // Load saved settings
    function loadSettings() {
      const savedProxy = localStorage.getItem('proxy');
      const savedEngine = localStorage.getItem('engine');
      if (savedProxy) currentProxy = savedProxy;
      if (savedEngine) currentEngine = savedEngine;
      document.getElementById('proxySelect').value = currentProxy;
      document.getElementById('engineSelect').value = currentEngine;
    }

    // Save settings
    function saveSettings() {
      currentProxy = document.getElementById('proxySelect').value;
      currentEngine = document.getElementById('engineSelect').value;
      localStorage.setItem('proxy', currentProxy);
      localStorage.setItem('engine', currentEngine);
      settingsModal.classList.remove('active');
      showMessage('Settings saved!', 'success');
    }

    // Show message
    function showMessage(msg, type) {
      const div = document.createElement('div');
      div.textContent = msg;
      div.style.position = 'fixed';
      div.style.bottom = '20px';
      div.style.left = '50%';
      div.style.transform = 'translateX(-50%)';
      div.style.background = type === 'success' ? '#0066ff' : '#ff4444';
      div.style.color = 'white';
      div.style.padding = '12px 24px';
      div.style.borderRadius = '30px';
      div.style.zIndex = '3000';
      div.style.fontSize = '0.9rem';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2000);
    }

    // Load URL through proxy
    async function loadUrl(url) {
      if (!url) return;
      
      let targetUrl = url.trim();
      if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
        if (targetUrl.includes(' ') || !targetUrl.includes('.')) {
          // It's a search query
          const engines = {
            google: `https://www.google.com/search?q=${encodeURIComponent(targetUrl)}`,
            bing: `https://www.bing.com/search?q=${encodeURIComponent(targetUrl)}`,
            ddg: `https://duckduckgo.com/?q=${encodeURIComponent(targetUrl)}`
          };
          targetUrl = engines[currentEngine];
        } else {
          targetUrl = 'https://' + targetUrl;
        }
      }
      
      currentUrl = targetUrl;
      urlBar.value = targetUrl;
      loading.classList.add('active');
      
      // Update history
      if (historyIndex === -1 || historyStack[historyIndex] !== targetUrl) {
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(targetUrl);
        historyIndex++;
      }
      
      try {
        if (currentProxy === 'direct') {
          // Direct loading
          iframe.src = targetUrl;
          iframe.onload = () => {
            loading.classList.remove('active');
            homepage.classList.add('hidden');
            browserView.classList.add('active');
          };
        } else {
          // Proxy loading
          let proxyUrl = '';
          if (currentProxy === 'cors') {
            proxyUrl = `https://cors-anywhere.herokuapp.com/${targetUrl}`;
          } else if (currentProxy === 'allorigins') {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
            const data = await response.json();
            if (data.contents) {
              const html = data.contents;
              const blob = new Blob([html], { type: 'text/html' });
              const blobUrl = URL.createObjectURL(blob);
              iframe.src = blobUrl;
              iframe.onload = () => {
                loading.classList.remove('active');
                homepage.classList.add('hidden');
                browserView.classList.add('active');
              };
              return;
            }
          } else if (currentProxy === 'corsproxy') {
            proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
          }
          
          if (proxyUrl) {
            iframe.src = proxyUrl;
            iframe.onload = () => {
              loading.classList.remove('active');
              homepage.classList.add('hidden');
              browserView.classList.add('active');
            };
          }
        }
        
        iframe.onerror = () => {
          loading.classList.remove('active');
          showMessage('Failed to load. Try a different proxy.', 'error');
        };
        
      } catch (error) {
        loading.classList.remove('active');
        showMessage('Error loading page. Try direct mode.', 'error');
      }
    }
    
    // Navigation functions
    function goBack() {
      if (historyIndex > 0) {
        historyIndex--;
        loadUrl(historyStack[historyIndex]);
      }
    }
    
    function goForward() {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        loadUrl(historyStack[historyIndex]);
      }
    }
    
    function refresh() {
      if (currentUrl) {
        loadUrl(currentUrl);
      }
    }
    
    function goHome() {
      homepage.classList.remove('hidden');
      browserView.classList.remove('active');
      currentUrl = '';
    }
    
    // Event listeners
    document.getElementById('settingsBtn').addEventListener('click', () => {
      settingsModal.classList.add('active');
    });
    
    document.getElementById('closeModal').addEventListener('click', () => {
      settingsModal.classList.remove('active');
    });
    
    document.getElementById('saveSettings').addEventListener('click', saveSettings);
    
    document.getElementById('homeSearchBtn').addEventListener('click', () => {
      const query = homeSearch.value;
      if (query) loadUrl(query);
    });
    
    homeSearch.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const query = homeSearch.value;
        if (query) loadUrl(query);
      }
    });
    
    document.getElementById('goBtn').addEventListener('click', () => {
      const url = urlBar.value;
      if (url) loadUrl(url);
    });
    
    urlBar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const url = urlBar.value;
        if (url) loadUrl(url);
      }
    });
    
    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('forwardBtn').addEventListener('click', goForward);
    document.getElementById('refreshBtn').addEventListener('click', refresh);
    
    document.querySelectorAll('.quick-site').forEach(site => {
      site.addEventListener('click', () => {
        const url = site.dataset.url;
        if (url) loadUrl(url);
      });
    });
    
    // Close modal when clicking outside
    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        settingsModal.classList.remove('active');
      }
    });
    
    // Load settings on start
    loadSettings();
    
    // Handle iframe navigation updates
    iframe.addEventListener('load', () => {
      loading.classList.remove('active');
      try {
        const iframeUrl = iframe.contentWindow.location.href;
        if (iframeUrl && iframeUrl !== 'about:blank') {
          urlBar.value = iframeUrl;
        }
      } catch (e) {
        // Cross-origin, can't access URL
      }
    });
  </script>
</body>
</html>
